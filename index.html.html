<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSc Interactive ChemStudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-gate: #0a1128; --studio-bg: #070b19; --sidebar-bg: #0f1426;
            --chapter-bg: #171f3b; --card-bg: #131a33; --border-color: #24315e;
            --skin-btn: #eecda3; --skin-btn-hover: #e2bc8a; --fsc-green: #00e676;
            --fsc-blue: #29b6f6; --fsc-orange: #ff9100; --text-main: #f0f4f8; --text-muted: #8fa0c0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--studio-bg); color: var(--text-main);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        /* Confetti Layer */
        #confettiCanvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 9999; 
        }

        /* BACK BUTTON */
        .top-nav { padding: 15px 25px; }
        .back-btn {
            background: #171f3b; border: 1px solid var(--fsc-blue); color: var(--fsc-blue);
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem; transition: 0.3s;
        }
        .back-btn:hover { background: var(--fsc-blue); color: #000; }

        /* GATEWAY */
        .gateway-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--navy-gate); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            font-family: 'Orbitron', sans-serif;
        }
        .gateway-title { font-size: 3rem; color: #fff; margin-bottom: 20px; }
        .skin-button { background: var(--skin-btn); color: #000; padding: 15px 40px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        /* LAYOUT */
        .portal-layout { display: none; height: 100%; width: 100%; }
        .fsc-sidebar { width: 350px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .workspace-stage { flex: 1; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Briefing & Other Styles ... (Keeping your existing styles) */
        .briefing-popup-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; justify-content: center; align-items: center; }
        .briefing-card { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; max-width: 600px; }
        
        .layout-grid { display: flex; gap: 20px; }
        .chamber-card { background: var(--card-bg); padding: 20px; border-radius: 15px; }
        canvas { background: #000; border: 1px solid #333; }
    </style>
</head>
<body>

    <canvas id="confettiCanvas"></canvas>

    <div id="gatewayScreen" class="gateway-screen">
        <h1 class="gateway-title">FSc ChemStudio</h1>
        <button class="skin-button" onclick="enterPortal()">START SIMULATION</button>
    </div>

    <div id="portalLayout" class="portal-layout">
        <div class="fsc-sidebar">
            <div style="padding:20px;"><h3>Chemistry Modules</h3></div>
            </div>
        <div class="workspace-stage">
            <div class="top-nav">
                <button class="back-btn" onclick="goBack()">← BACK TO GATEWAY</button>
            </div>
            <div class="layout-grid">
                <div class="chamber-card">
                    <canvas id="sandbox" width="500" height="300"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Navigation Logic ---
        function enterPortal() {
            document.getElementById('gatewayScreen').style.display = 'none';
            document.getElementById('portalLayout').style.display = 'flex';
        }

        function goBack() {
            document.getElementById('portalLayout').style.display = 'none';
            document.getElementById('gatewayScreen').style.display = 'flex';
            triggerConfetti();
        }

        // --- Confetti Logic ---
        function triggerConfetti() {
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    vx: Math.random() * 4 - 2,
                    vy: Math.random() * 5 + 2,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 10, 10);
                });
                if(particles[0].y < canvas.height) requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
