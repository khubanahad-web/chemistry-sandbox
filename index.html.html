<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSc Interactive Chemistry Portal</title>
    <style>
        :root {
            --navy-gate: #0a1128;
            --studio-bg: #070b19;
            --sidebar-bg: #0f1426;
            --chapter-bg: #171f3b;
            --card-bg: #131a33;
            --border-color: #24315e;
            --skin-btn: #eecda3;
            --skin-btn-hover: #e2bc8a;
            --fsc-green: #00e676;
            --fsc-blue: #29b6f6;
            --fsc-orange: #ff9100;
            --text-main: #f0f4f8;
            --text-muted: #8fa0c0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--studio-bg); color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; user-select: none;
        }

        /* SCREEN 1: BIG NAVY BLUE ENTRY GATEWAY */
        .gateway-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--navy-gate); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: all 0.5s ease;
        }

        .gateway-title {
            font-size: 2.8rem; font-weight: 800; margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #8fa0c0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .gateway-subtitle {
            color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px;
        }

        .gateway-btn-group { display: flex; gap: 25px; }

        .skin-button {
            background-color: var(--skin-btn); color: #2c1a04;
            font-size: 1.2rem; font-weight: 700; padding: 16px 40px;
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(238, 205, 163, 0.2);
            transition: all 0.2s ease;
        }

        .skin-button:hover {
            background-color: var(--skin-btn-hover); transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(238, 205, 163, 0.3);
        }

        /* MAIN PORTAL WORKSPACE SCHEMES */
        .portal-layout { display: none; height: 100%; width: 100%; }

        .fsc-sidebar {
            width: 350px; background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; height: 100%;
        }

        .sidebar-header {
            padding: 20px; border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, rgba(41,182,246,0.05), transparent);
        }

        .sidebar-header h1 { font-size: 1.3rem; margin: 0; font-weight: 800; color: var(--fsc-blue); }

        .chapter-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

        .chapter-accordion { background-color: var(--chapter-bg); border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; }

        .chapter-header {
            width: 100%; padding: 12px 15px; background: none; border: none;
            color: var(--text-main); font-size: 0.88rem; font-weight: 700;
            text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }

        .chapter-header:hover { background-color: rgba(255,255,255,0.02); }

        .rxn-container { display: none; background-color: rgba(0,0,0,0.2); padding: 6px; flex-direction: column; gap: 4px; }

        .rxn-btn {
            background: none; border: none; border-radius: 6px; padding: 10px 12px;
            color: var(--text-muted); font-size: 0.82rem; text-align: left; cursor: pointer; transition: all 0.2s;
        }
        .rxn-btn:hover { color: var(--text-main); background-color: rgba(255,255,255,0.04); }
        .rxn-btn.active { color: #000; background-color: var(--skin-btn); font-weight: 700; }

        .workspace-stage { flex: 1; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; gap: 20px; position: relative; }

        /* POP-UP DETAILED BRIEFING OVERLAY SYSTEM */
        .briefing-popup-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(7, 11, 25, 0.95); z-index: 50;
            display: none; justify-content: center; align-items: center;
        }

        .briefing-card {
            background-color: var(--card-bg); border: 2px solid var(--border-color);
            border-radius: 20px; padding: 35px; max-width: 620px; width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .briefing-card h2 { margin: 0 0 15px 0; color: var(--fsc-orange); font-size: 1.6rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }

        .details-grid { display: flex; flex-direction: column; gap: 12px; text-align: left; margin-bottom: 25px; }

        .detail-item { font-size: 0.95rem; line-height: 1.5; }
        .detail-item strong { color: var(--fsc-blue); display: inline-block; width: 150px; }

        /* SIMULATION WORKBENCH DESK */
        .layout-grid { display: flex; gap: 24px; align-items: flex-start; }
        .chamber-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        canvas { background-color: #050710; border-radius: 10px; border: 1px solid var(--border-color); cursor: grab; }
        canvas:active { cursor: grabbing; }

        .slider-wrapper { width: 100%; margin-top: 20px; }
        input[type="range"] { width: 100%; height: 6px; background: var(--border-color); border-radius: 4px; outline: none; accent-color: var(--fsc-orange); cursor: pointer; }

        .analytics-deck { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 320px; }
        .stat-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 18px;
