<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FSc Chemistry Sandbox</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@300;400&display=swap');
        body { margin:0; background:#070b19; color:#fff; font-family: 'Roboto', sans-serif; overflow:hidden; }
        .screen { position:fixed; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: #29b6f6; }
        .btn { background: #eecda3; color:#000; padding:15px 40px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:1.2rem; }
        
        #lab-ui { display:none; flex-direction:row; height:100vh; }
        #sidebar { width: 300px; background: #0f1426; padding:20px; border-right: 2px solid #24315e; overflow-y:auto; }
        #canvas-area { flex:1; position:relative; padding:20px; background-image: radial-gradient(#1a1a2e 1px, transparent 1px); background-size: 40px 40px; }
        
        canvas { width:100%; height:100%; }
        .popup { position:absolute; top:20%; left:25%; background:#131a33; padding:30px; border-radius:20px; border:2px solid #24315e; z-index:10; }
    </style>
</head>
<body>

<div id="welcome" class="screen">
    <h1>Welcome to our Chemistry Sandbox</h1>
    <button class="btn" onclick="showReactions()">NEXT</button>
</div>

<div id="choice" class="screen" style="display:none;">
    <button class="btn" onclick="showChapters('FSc 1')">FSc Part 1</button>
    <button class="btn" onclick="showChapters('FSc 2')">FSc Part 2</button>
</div>

<div id="lab-ui">
    <div id="sidebar">
        <h2 id="chap-title">Chapters</h2>
        <div id="chap-list"></div>
        <div id="rxn-list" style="display:none; margin-top:20px;"></div>
    </div>
    <div id="canvas-area">
        <canvas id="sandbox"></canvas>
        <div id="popup" class="popup" style="display:none;"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('sandbox');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    function showReactions() { document.getElementById('welcome').style.display='none'; document.getElementById('choice').style.display='flex'; }
    
    function showChapters(part) {
        document.getElementById('choice').style.display='none';
        document.getElementById('lab-ui').style.display='flex';
        const list = document.getElementById('chap-list');
        for(let i=1; i<=12; i++) {
            let d = document.createElement('div');
            d.innerHTML = `Chapter ${i}`; d.style.padding="10px"; d.style.cursor="pointer";
            d.onclick = () => showRxns(i);
            list.appendChild(d);
        }
    }

    function showRxns(ch) {
        const r = document.getElementById('rxn-list');
        r.style.display='block'; r.innerHTML = "<h3>10 Reactions:</h3>";
        for(let i=1; i<=10; i++) {
            let b = document.createElement('div');
            b.innerHTML = `Reaction ${i}`; b.style.padding="5px"; b.onclick = () => openPopup(i);
            r.appendChild(b);
        }
    }

    function openPopup(id) {
        const p = document.getElementById('popup');
        p.style.display='block';
        p.innerHTML = `
            <h2>Reaction Preview</h2>
            <div style="display:flex; align-items:center;">
                <div style="width:40px;height:40px;background:pink;border-radius:50%"></div> + 
                <div style="width:40px;height:40px;background:cyan;border-radius:50%"></div> → Product
            </div>
            <button class="btn" onclick="startSim()">Next</button>
        `;
    }

    function startSim() {
        document.getElementById('popup').innerHTML = "Stickman: Good Luck! <button class='btn' onclick='go()'>GO</button>";
    }

    function go() {
        document.getElementById('popup').style.display='none';
        animate();
    }

    function animate() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        // Simple big atom drawing
        ctx.fillStyle = "#fff";
        ctx.font = "20px Arial";
        ctx.fillText("Na+", 200, 200);
        ctx.fillText("Cl-", 400, 200);
        // Add condition check logic here later
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
