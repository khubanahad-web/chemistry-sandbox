<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FSc Chemistry Learning Portal</title>
    <style>
        :root { --navy: #0a1128; --sidebar: #0f1426; --accent: #eecda3; --bg: #070b19; }
        body, html { margin:0; padding:0; height:100%; background: var(--bg); color: #fff; font-family: sans-serif; overflow:hidden; }
        
        #gateway { position:fixed; width:100%; height:100%; background:var(--navy); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
        .btn { background: var(--accent); color:#000; padding:15px 30px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin:10px; }

        #main-ui { display:none; height:100vh; display:flex; }
        #sidebar { width: 350px; background: var(--sidebar); border-right: 1px solid #24315e; padding:20px; overflow-y:auto; }
        #workspace { flex:1; position:relative; padding:10px; }
        
        canvas { background: #050710; width:100%; height:100%; border-radius:10px; display:block; }
        
        #popup { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(7,11,25,0.9); display:flex; justify-content:center; align-items:center; z-index:50; }
        .card { background:#131a33; padding:40px; border-radius:20px; text-align:center; }
    </style>
</head>
<body>

<div id="gateway">
    <h1>FSc Chemistry Learning Portal</h1>
    <div>
        <button class="btn" onclick="initPortal('Part-I')">FSc Part-I</button>
        <button class="btn" onclick="initPortal('Part-II')">FSc Part-II</button>
    </div>
</div>

<div id="main-ui">
    <div id="sidebar">
        <h2 id="title">FSc Chemistry</h2>
        <div id="chaps">
            <div style="padding:10px; border-bottom:1px solid #24315e; cursor:pointer;" onclick="showPopup('Hydrogenation of Ethene', 'CH₂=CH₂ + H₂ → CH₃-CH₃')">Chapter 8: Hydrogenation of Ethene</div>
            <div style="padding:10px; border-bottom:1px solid #24315e; cursor:pointer;" onclick="showPopup('Hydrohalogenation', 'CH₃-CH=CH₂ + HCl → Product')">Chapter 8: Hydrohalogenation</div>
        </div>
        <div id="side-info" style="margin-top:20px; color:#8fa0c0;"></div>
    </div>
    <div id="workspace">
        <div id="popup" style="display:none;">
            <div class="card">
                <h2 id="p-title"></h2>
                <p id="p-eq" style="font-size:1.5rem; color:#29b6f6;"></p>
                <button class="btn" onclick="closePopup()">Understood, Enter Simulation</button>
            </div>
        </div>
        <canvas id="sandbox"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('sandbox');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initPortal(cohort) {
        document.getElementById('gateway').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.getElementById('title').textContent = "FSc " + cohort;
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        animate();
    }

    function showPopup(title, eq) {
        document.getElementById('popup').style.display = 'flex';
        document.getElementById('p-title').textContent = title;
        document.getElementById('p-eq').textContent = eq;
        window.tempTitle = title; window.tempEq = eq;
    }

    function closePopup() {
        document.getElementById('popup').style.display = 'none';
        document.getElementById('side-info').innerHTML = `<h3>${window.tempTitle}</h3><p>${window.tempEq}</p>`;
        particles = [];
        for(let i=0; i<20; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4});
    }

    function animate() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.x<0 || p.x>canvas.width) p.vx*=-1;
            if(p.y<0 || p.y>canvas.height) p.vy*=-1;
            ctx.fillStyle = "#ff65a3"; ctx.beginPath(); ctx.arc(p.x,p.y,15,0,Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
