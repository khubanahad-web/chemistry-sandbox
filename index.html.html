<script>
    // ... (keep all your existing variables and setup) ...

    function drawEnergyEffect(p1, p2, type) {
        ctx.beginPath();
        if (type === "Exothermic") {
            // White/Yellow Sparks
            ctx.strokeStyle = "#ffeb3b";
            for(let i=0; i<8; i++) {
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p1.x + Math.cos(i)*40, p1.y + Math.sin(i)*40);
            }
            ctx.stroke();
        } else {
            // Endothermic Red Aura/Blurry Lines
            ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(p1.x, p1.y, p1.radius + 10, 0, Math.PI*2);
            ctx.stroke();
        }
    }

    // Inside renderLoop, add collision detection:
    function checkCollisions() {
        for(let i=0; i<particles.length; i++) {
            for(let j=i+1; j<particles.length; j++) {
                let p1 = particles[i]; let p2 = particles[j];
                let dx = p1.x - p2.x; let dy = p1.y - p2.y;
                if(Math.sqrt(dx*dx + dy*dy) < p1.radius + p2.radius) {
                    // Trigger visual based on temp
                    if(Math.abs(temperature - activeRxn.temp) < 50) {
                        drawEnergyEffect(p1, p2, activeRxn.type || "Exothermic");
                    }
                }
            }
        }
    }

    // Update your renderLoop:
    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        checkCollisions(); // Added visual logic
        requestAnimationFrame(renderLoop);
    }
</script>
