<script>
        const masterLibrary = [
            { title: "Hydrogenation of Ethene", formula: "CH₂=CH₂ + H₂ → CH₃-CH₃", points: "Saturated alkane transformation.", temp: 250, catalyst: "Finely divided Nickel (Ni)", byproduct: "None", t1: "Ethene", t2: "H₂", c1: "#ff65a3", c2: "#29b6f6", r1:21, r2:14, type: "Exothermic" },
            { title: "Hydrohalogenation of Propene", formula: "CH₃-CH=CH₂ + HCl → Product", points: "Electrophilic addition.", temp: 100, catalyst: "None", byproduct: "Trace isomers", t1: "Propene", t2: "HCl", c1: "#ff9100", c2: "#00e676", r1:24, r2:15, type: "Endothermic" }
        ];

        let activeRxn = masterLibrary[0];
        let temperature = 25; 
        let particles = []; 
        let draggedParticle = null;

        const canvas = document.getElementById('sandbox'); 
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider'); 
        const tempDisplay = document.getElementById('tempDisplay');

        function enterPortal(cohort) {
            document.getElementById('gatewayScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gatewayScreen').style.display = 'none';
                document.getElementById('portalLayout').style.display = 'flex';
                document.getElementById('sidebarCohortTitle').textContent = `FSc ${cohort} Chemistry`;
                toggleChapter(8);
            }, 300);
        }

        function toggleChapter(id) {
            const container = document.getElementById(`box-${id}`);
            if(!container) return;
            const isVisible = container.style.display === 'flex';
            document.querySelectorAll('.rxn-container').forEach(c => c.style.display = 'none');
            document.querySelectorAll('[id^="arr-"]').forEach(a => a.textContent = '▼');
            if(!isVisible) { container.style.display = 'flex'; document.getElementById(`arr-${id}`).textContent = '▲'; }
        }

        function triggerBriefing(index, element) {
            document.querySelectorAll('.rxn-btn').forEach(b => b.classList.remove('active'));
            if(element) element.classList.add('active');
            activeRxn = masterLibrary[index];
            document.getElementById('popupTitle').textContent = activeRxn.title;
            document.getElementById('popPoints').textContent = activeRxn.points;
            document.getElementById('popTemp').textContent = activeRxn.temp + "°C";
            document.getElementById('popCatalyst').textContent = activeRxn.catalyst;
            document.getElementById('popByproduct').textContent = activeRxn.byproduct;
            document.getElementById('textbookEq').textContent = activeRxn.formula;
            document.getElementById('activeCatLabel').textContent = activeRxn.catalyst;
            document.getElementById('briefingPopup').style.display = 'flex';
        }

        function closeBriefingPopup() {
            document.getElementById('briefingPopup').style.display = 'none';
            initChamber();
        }

        class Atom {
            constructor(x, y, label, color, r) {
                this.x = x; this.y = y; this.label = label; this.color = color; this.radius = r;
                this.vx = (Math.random() - 0.5) * 1.5; this.vy = (Math.random() - 0.5) * 1.5;
            }
            update() {
                if(this === draggedParticle) return;
                let speedFactor = 1 + (temperature - 25) * 0.012;
                this.x += this.vx * speedFactor; this.y += this.vy * speedFactor;
                if(this.x - this.radius < 0 || this.x + this.radius > canvas.width) this.vx *= -1;
                if(this.y - this.radius < 0 || this.y + this.radius > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.shadowBlur = 0; ctx.fill(); ctx.closePath();
                ctx.fillStyle = "#000000"; ctx.font = "bold 9px sans-serif"; ctx.textAlign="center"; ctx.fillText(this.label, this.x, this.y);
            }
        }

        // Energy Effect Function
        function drawEnergyEffect(p) {
            ctx.beginPath();
            if (activeRxn.type === "Exothermic") {
                ctx.strokeStyle = "#ffeb3b"; // Yellow Spark
                for(let i=0; i<4; i++) {
                    let a = i * Math.PI/2;
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(a)*40, p.y + Math.sin(a)*40);
                }
            } else {
                ctx.strokeStyle = "red"; // Red Blurry Lines
                for(let i=0; i<6; i++) {
                    let a = i * Math.PI/3;
                    ctx.moveTo(p.x + Math.cos(a)*10, p.y + Math.sin(a)*10);
                    ctx.lineTo(p.x + Math.cos(a)*30, p.y + Math.sin(a)*30);
                }
            }
            ctx.stroke();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect(); 
            const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
            for(let p of particles) {
                if(Math.hypot(mx - p.x, my - p.y) < p.radius + 12) { draggedParticle = p; break; }
            }
        });
        window.addEventListener('mouseup', () => { draggedParticle = null; });

        tempSlider.addEventListener('input', (e) => {
            temperature = parseInt(e.target.value); 
            tempDisplay.textContent = temperature + "°C";
        });

        function initChamber() {
            particles = [];
            for(let i=0; i<6; i++) {
                particles.push(new Atom(Math.random()*400+60, Math.random()*230+60, activeRxn.t1, activeRxn.c1, activeRxn.r1));
                particles.push(new Atom(Math.random()*400+60, Math.random()*230+60, activeRxn.t2, activeRxn.c2, activeRxn.r2));
            }
        }

        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update(); p.draw();
                // Only show effect if temp is near the requirement
                if(Math.abs(temperature - activeRxn.temp) < 40) {
                    drawEnergyEffect(p);
                }
            });
            requestAnimationFrame(renderLoop);
        }
        renderLoop();
    </script>
