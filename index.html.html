<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FSc Chemistry Studio</title>
    <style>
        :root { --bg: #070b19; --sidebar: #0f1426; --accent: #29b6f6; --text: #f0f4f8; }
        body { margin:0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow:hidden; }
        
        #layout { display: flex; height: 100vh; }
        #sidebar { width: 300px; background: var(--sidebar); padding: 20px; border-right: 1px solid #24315e; }
        #workspace { flex: 1; position: relative; }
        
        #popup-overlay { position:absolute; width:100%; height:100%; background:rgba(7,11,25,0.95); z-index:10; display:flex; justify-content:center; align-items:center; }
        .card { background: #131a33; padding: 30px; border-radius: 15px; border: 1px solid #24315e; text-align: center; width: 500px; }
        
        canvas { width: 100%; height: 100%; }
        .atom-label { color: #fff; font-weight:bold; }
    </style>
</head>
<body>

<div id="layout">
    <div id="sidebar">
        <h2>Chemistry Lab</h2>
        <div id="side-info">Select a reaction to start.</div>
    </div>
    <div id="workspace">
        <div id="popup-overlay">
            <div class="card" id="popup-content">
                <h2 id="r-title">Hydrogenation of Ethene</h2>
                <p id="r-eq" style="font-size:1.2rem; color:var(--accent);">CH₂=CH₂ + H₂ → CH₃-CH₃</p>
                <div style="height:100px; background:#000; margin:20px 0; display:flex; justify-content:center; align-items:center; border-radius:8px;">
                    <div style="width:30px; height:30px; background:pink; border-radius:50%; margin:10px;"></div>
                    <div style="width:30px; height:30px; background:cyan; border-radius:50%; margin:10px;"></div>
                </div>
                <p id="r-desc">Exothermic: Releases heat.</p>
                <button onclick="startSimulation()" style="padding:10px 20px; cursor:pointer;">Understood, Enter Simulation</button>
            </div>
        </div>
        <canvas id="sandbox"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('sandbox');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth - 300;
    canvas.height = window.innerHeight;

    let particles = [];
    
    class Particle {
        constructor(color, type) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = (Math.random() - 0.5) * 4;
            this.color = color;
            this.type = type;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 15, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    function startSimulation() {
        document.getElementById('popup-overlay').style.display = 'none';
        document.getElementById('side-info').innerHTML = `
            <h3>Hydrogenation of Ethene</h3>
            <p><strong>Equation:</strong> CH₂=CH₂ + H₂ → CH₃-CH₃</p>
            <p><strong>Type:</strong> Exothermic</p>
            <p>The energy is released during bond formation.</p>
        `;
        // Create the moving particles
        for(let i=0; i<10; i++) {
            particles.push(new Particle("pink", "reactant"));
            particles.push(new Particle("cyan", "reactant"));
        }
    }

    function animate() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
