<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FSc Chemistry Learning Portal</title>
    <style>
        :root {
            --navy-gate: #0a1128;
            --studio-bg: #070b19;
            --sidebar-bg: #0f1426;
            --border-color: #24315e;
            --skin-btn: #eecda3;
            --text-main: #f0f4f8;
            --fsc-blue: #29b6f6;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--studio-bg); color: var(--text-main); font-family: sans-serif; overflow: hidden; }

        .gateway-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--navy-gate); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .skin-button { background-color: var(--skin-btn); color: #2c1a04; font-weight: 700; padding: 15px 38px; border: none; border-radius: 12px; cursor: pointer; }
        
        .portal-layout { display: none; height: 100%; width: 100%; display: flex; }
        .fsc-sidebar { width: 350px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 20px; }
        .workspace-stage { flex: 1; padding: 25px; position: relative; background: var(--studio-bg); }
        canvas { background-color: #050710; border: 1px solid var(--border-color); border-radius: 10px; width: 100%; height: 80%; }
        
        .briefing-popup-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(7, 11, 25, 0.95); z-index: 50; display: none; justify-content: center; align-items: center; }
        .briefing-card { background-color: #131a33; border: 1px solid var(--border-color); border-radius: 20px; padding: 35px; width: 500px; }
    </style>
</head>
<body>

    <div id="gatewayScreen" class="gateway-screen">
        <h1>FSc Chemistry Learning Portal</h1>
        <button class="skin-button" onclick="enterPortal()">Enter Portal</button>
    </div>

    <div id="portalLayout" class="portal-layout">
        <div class="fsc-sidebar">
            <h2>FSc Chemistry</h2>
            <div id="side-info">Select a reaction to begin.</div>
        </div>
        <div class="workspace-stage">
            <div id="briefingPopup" class="briefing-popup-overlay">
                <div class="briefing-card">
                    <h2 id="popupTitle">Hydrogenation of Ethene</h2>
                    <p>Temperature: <span id="popTemp">250</span>°C</p>
                    <button class="skin-button" onclick="closeBriefing()">Understood, Enter Simulation</button>
                </div>
            </div>
            <canvas id="sandbox"></canvas>
            <input type="range" id="tempSlider" min="25" max="600" value="25" style="width:100%;">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sandbox');
        const ctx = canvas.getContext('2d');
        let particles = [], temp = 25, type = "Exothermic";

        function enterPortal() {
            document.getElementById('gatewayScreen').style.display = 'none';
            document.getElementById('portalLayout').style.display = 'flex';
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            initChamber();
            animate();
        }

        function closeBriefing() {
            document.getElementById('briefingPopup').style.display = 'none';
        }

        class Atom {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, 15, 0, Math.PI*2);
                ctx.fillStyle = "#ff65a3"; ctx.fill();
                // Energy Logic
                if (Math.abs(temp - 250) < 50) {
                    ctx.strokeStyle = (type === "Exothermic") ? "yellow" : "red";
                    ctx.moveTo(this.x, this.y); ctx.lineTo(this.x+20, this.y+20);
                    ctx.stroke();
                }
            }
        }

        function initChamber() { for(let i=0; i<10; i++) particles.push(new Atom()); }
        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.draw(); });
            requestAnimationFrame(animate);
        }
        document.getElementById('tempSlider').oninput = (e) => temp = e.target.value;
    </script>
</body>
</html>
