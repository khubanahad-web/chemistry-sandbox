<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSc Part-II Chemistry Studio</title>
    <style>
        :root {
            --studio-bg: #0b0d17;
            --sidebar-bg: #111422;
            --chapter-bg: #191e32;
            --card-bg: #161b2e;
            --border-color: #252d4a;
            --fsc-green: #00e676;
            --fsc-blue: #29b6f6;
            --fsc-orange: #ff9100;
            --text-main: #f0f4f8;
            --text-muted: #8fa0c0;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--studio-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* 12-CHAPTER ACCORDION SIDEBAR */
        .fsc-sidebar {
            width: 340px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, rgba(0,230,118,0.05), transparent);
        }

        .sidebar-header h1 {
            font-size: 1.3rem; margin: 0; font-weight: 800; color: var(--fsc-green);
            letter-spacing: 0.5px;
        }

        .sidebar-header p {
            margin: 4px 0 0 0; font-size: 0.8rem; color: var(--text-muted);
        }

        .chapter-list {
            flex: 1; overflow-y: auto; padding: 12px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .chapter-accordion {
            background-color: var(--chapter-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px; overflow: hidden;
        }

        .chapter-header {
            width: 100%; padding: 12px 15px;
            background: none; border: none;
            color: var(--text-main); font-size: 0.88rem; font-weight: 700;
            text-align: left; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }

        .chapter-header:hover { background-color: rgba(255,255,255,0.02); }

        .rxn-container {
            display: none; background-color: rgba(0,0,0,0.2);
            padding: 6px; flex-direction: column; gap: 4px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .rxn-btn {
            background: none; border: none; border-radius: 6px;
            padding: 10px 12px; color: var(--text-muted);
            font-size: 0.82rem; text-align: left; cursor: pointer;
            transition: all 0.2s;
        }

        .rxn-btn:hover { color: var(--text-main); background-color: rgba(255,255,255,0.04); }
        .rxn-btn.active { color: #ffffff; background-color: var(--fsc-green); font-weight: 600; }

        /* MAIN WORKSPACE INTERFACE */
        .workspace-stage {
            flex: 1; display: flex; flex-direction: column;
            padding: 25px; overflow-y: auto; gap: 20px;
            position: relative;
        }

        .layout-grid { display: flex; gap: 24px; align-items: flex-start; }

        .chamber-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        canvas { background-color: #070911; border-radius: 10px; border: 1px solid var(--border-color); }

        .slider-wrapper { width: 100%; margin-top: 20px; }
